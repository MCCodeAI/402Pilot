<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif">
  <title>PaymentExecutor implementations and the local x402 witness stack</title>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 0.6; }
      .abstract { fill: #f8fafc; stroke: #94a3b8; stroke-width: 0.6; stroke-dasharray: 4 3; }
      .teal { fill: #ccfbf1; stroke: #0d9488; stroke-width: 0.6; }
      .arr { fill: none; stroke: #64748b; stroke-width: 0.6; }
      .t { font-size: 14px; fill: #0f172a; }
      .th { font-size: 14px; font-weight: 500; fill: #0f172a; }
      .ts { font-size: 12px; fill: #475569; }
      .ts-dark { font-size: 12px; fill: #0f766e; }
    </style>
  </defs>

  <rect class="box" x="170" y="40" width="340" height="70" rx="6"/>
  <text class="th" x="340" y="68" text-anchor="middle">PaymentExecutor</text>
  <text class="ts" x="340" y="92" text-anchor="middle">pay_and_call(provider, payload) &#8594; Outcome</text>

  <path class="arr" d="M 340 110 V 140 H 140 V 158" marker-end="url(#arrow)"/>
  <path class="arr" d="M 340 110 V 158" marker-end="url(#arrow)"/>
  <path class="arr" d="M 340 110 V 140 H 540 V 158" marker-end="url(#arrow)"/>

  <rect class="box" x="50" y="160" width="180" height="80" rx="6"/>
  <text class="th" x="140" y="188" text-anchor="middle">ReplayExecutor</text>
  <text class="ts" x="140" y="210" text-anchor="middle">frozen trace JSON</text>
  <text class="ts" x="140" y="228" text-anchor="middle">main experiments</text>

  <rect class="teal" x="250" y="160" width="180" height="80" rx="6"/>
  <text class="th" x="340" y="188" text-anchor="middle">X402Executor</text>
  <text class="ts-dark" x="340" y="210" text-anchor="middle">real x402 round-trip</text>
  <text class="ts-dark" x="340" y="228" text-anchor="middle">integration witness</text>

  <rect class="abstract" x="450" y="160" width="180" height="80" rx="6"/>
  <text class="th" x="540" y="188" text-anchor="middle">Future rails</text>
  <text class="ts" x="540" y="210" text-anchor="middle">Lightning, ACH, &#8230;</text>
  <text class="ts" x="540" y="228" text-anchor="middle">extensibility</text>

  <path class="arr" d="M 340 240 V 278" marker-end="url(#arrow)"/>

  <rect class="teal" x="250" y="280" width="180" height="44" rx="6"/>
  <text class="t" x="340" y="300" text-anchor="middle">Resource Server</text>
  <text class="ts-dark" x="340" y="316" text-anchor="middle">FastAPI + x402 SDK</text>

  <path class="arr" d="M 340 324 V 340" marker-end="url(#arrow)"/>

  <rect class="teal" x="250" y="342" width="180" height="44" rx="6"/>
  <text class="t" x="340" y="362" text-anchor="middle">Facilitator</text>
  <text class="ts-dark" x="340" y="378" text-anchor="middle">Python x402 SDK</text>

  <path class="arr" d="M 340 386 V 402" marker-end="url(#arrow)"/>

  <rect class="teal" x="250" y="404" width="180" height="44" rx="6"/>
  <text class="t" x="340" y="424" text-anchor="middle">Anvil fork</text>
  <text class="ts-dark" x="340" y="440" text-anchor="middle">USDC + mainnet state</text>
</svg>
